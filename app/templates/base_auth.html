<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Auth{% endblock %} - SnapShop</title>
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f9;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }

        .auth-card {
            width: 450px;
            border: none;
            border-radius: 0.75rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
            background: #fff;
        }

        .btn-primary {
            background-color: #8e75ff !important;
            border-color: #8e75ff !important;
        }

        .brand-logo {
            color: #8e75ff;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 1rem;
            padding-top: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="card auth-card">
        <div class="brand-logo">
            <img src="{{ url_for('static', filename='assets/img/snapshop-logo.png') }}" alt="SnapShop Logo" height="32"
                class="me-2"
                onerror="this.onerror=null; this.src=''; this.parentElement.innerHTML='<i class=\'bx bx-store-alt\'></i> SnapShop';">
            SnapShop
        </div>

        {% block content %}{% endblock %}

        {# Logic: Show "Back to Login" link on Register/Forgot Password pages, hide on Login page #}
        {% if request.endpoint != 'login.login' %}
        <div class="text-center pb-4">
            <a href="{{ url_for('login.login') }}" class="text-decoration-none small">
                <i class="bx bx-chevron-left"></i> Back to Login
            </a>
        </div>
        {% endif %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>

</html>
