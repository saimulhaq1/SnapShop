name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        uses: fjogeleit/http-request-action@v1.15.1
        with:
          url: ${{ secrets.RENDER_DEPLOY_HOOK }}
          method: 'POST'
          timeout: '30000'
